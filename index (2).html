<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Metrocasa – Valorização SP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root {
  --bg: #F0F2F5;
  --card: #fff;
  --navy: #0E2A47;
  --blue: #1A5276;
  --muted: #6B7280;
  --border: #E2E8F0;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1a1a2e; font-size: 14px; }

/* HEADER */
header {
  background: var(--navy);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.logo { color: #fff; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.logo span { font-size: 11px; font-weight: 400; opacity: .6; }
.refresh-btn {
  padding: 6px 14px; background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2); border-radius: 8px;
  color: #fff; font-size: 12px; cursor: pointer; font-family: inherit;
}
.refresh-btn:hover { background: rgba(255,255,255,.22); }
.refresh-btn:disabled { opacity: .5; cursor: default; }

/* LAYOUT */
main { max-width: 900px; margin: 20px auto; padding: 0 16px; display: flex; flex-direction: column; gap: 14px; }

/* KPI ROW */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.kpi {
  background: var(--card); border-radius: var(--radius);
  padding: 14px 16px; border: 1px solid var(--border);
  border-top: 3px solid var(--blue);
}
.kpi-val { font-size: 22px; font-weight: 700; color: var(--navy); line-height: 1; }
.kpi-label { font-size: 11px; color: var(--muted); margin-top: 3px; }
.kpi-sub { font-size: 10px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* CARD */
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-title { font-size: 13px; font-weight: 600; color: var(--navy); }

/* TABS */
.tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 8px; padding: 3px; }
.tab { padding: 5px 12px; border-radius: 6px; border: none; font-family: inherit; font-size: 12px; color: var(--muted); cursor: pointer; background: transparent; font-weight: 500; }
.tab.active { background: var(--navy); color: #fff; }

/* ZONA FILTER */
.zone-sel { padding: 5px 10px; border-radius: 7px; border: 1px solid var(--border); background: var(--card); font-family: inherit; font-size: 12px; color: #1a1a2e; cursor: pointer; }

/* CHART — altura fixa pequena */
.chart-wrap { height: 220px; position: relative; }

/* TABLE */
.table-wrap { overflow-x: auto; margin-top: 14px; border-radius: 8px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { padding: 8px 10px; text-align: left; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; background: #F8FAFC; border-bottom: 1px solid var(--border); white-space: nowrap; }
th.r, td.r { text-align: right; }
td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #F8FAFC; }
.badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 20px; white-space: nowrap; }
.bar-row { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
.bar-bg { width: 50px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; }
.acum { font-weight: 700; min-width: 36px; text-align: right; font-size: 12px; }

/* LOADING */
.loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
.spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* STATUS */
.status { font-size: 11px; color: rgba(255,255,255,.55); }

/* FOOTER */
footer { text-align: center; padding: 20px; font-size: 11px; color: var(--muted); }

@media (max-width: 600px) {
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .kpi-val { font-size: 18px; }
  header { padding: 10px 14px; }
  main { padding: 0 10px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">🏙️ Metrocasa <span>Valorização SP 2022–2026</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="status" id="statusText">—</span>
    <button class="refresh-btn" id="refreshBtn" onclick="carregarDados()">↻ Atualizar</button>
  </div>
</header>

<main>
  <!-- KPIs -->
  <div class="kpi-row" id="kpiRow">
    <div class="kpi"><div class="spinner"></div></div>
  </div>

  <!-- Gráfico + tabela -->
  <div class="card">
    <div class="card-header">
      <div class="tabs">
        <button class="tab active" onclick="setAba('zonas',this)">Por zona</button>
        <button class="tab" onclick="setAba('empreend',this)">Por empreendimento</button>
      </div>
      <select class="zone-sel" id="zonaFilter" onchange="renderKpis(); renderAtual()">
        <option value="">Todas as zonas</option>
      </select>
    </div>

    <div class="chart-wrap">
      <canvas id="mainChart"></canvas>
    </div>

    <div class="table-wrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody">
          <tr><td colspan="8"><div class="loading"><div class="spinner"></div>Carregando...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<footer>Fonte: FipeZAP + Dataland (jun/2026) · Atualização manual</footer>

<script>
const URL_BASE = "https://yydfgynwdoqlbkrsrvjn.supabase.co";
const KEY      = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5ZGZneW53ZG9xbGJrcnNydmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5OTIwOTcsImV4cCI6MjA5NzU2ODA5N30.HbNaeeNwYwWb4MVq3_zfhgRv8zwvmnqcRE_J9waJ8GQ";
const CORES = {"Centro":"#1F618D","Zona Leste Norte":"#1A5276","Zona Leste Sul":"#2471A3","Zona Norte":"#117A65","Zona Sul":"#884EA0","Zona Sul Ext":"#A04000","Zona Oeste":"#B7770D"};
const cor = z => CORES[z] || "#6E7D8C";

let todosOsDados = [], aba = "zonas", chart = null;

function dadosFiltrados() {
  const zona = document.getElementById("zonaFilter").value;
  return zona ? todosOsDados.filter(d => d.zona === zona) : todosOsDados;
}

async function carregarDados() {
  const btn = document.getElementById("refreshBtn");
  btn.disabled = true; btn.textContent = "Carregando...";
  document.getElementById("statusText").textContent = "Buscando dados...";
  try {
    const url = `${URL_BASE}/rest/v1/valorizacao?select=*&order=variacao_acumulada.desc`;
    const r = await fetch(url, { headers: { apikey: KEY, Authorization: `Bearer ${KEY}` } });
    if (!r.ok) throw new Error(`Erro ${r.status}`);
    todosOsDados = await r.json();

    const zonas = [...new Set(todosOsDados.map(d => d.zona))].sort();
    const sel = document.getElementById("zonaFilter");
    const atual = sel.value;
    sel.innerHTML = '<option value="">Todas as zonas</option>';
    zonas.forEach(z => { const o = document.createElement("option"); o.value = z; o.textContent = z; if(z===atual) o.selected=true; sel.appendChild(o); });

    renderKpis();
    renderAtual();
    const h = new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    document.getElementById("statusText").textContent = `Atualizado ${h}`;
  } catch(e) {
    document.getElementById("statusText").textContent = "Erro ao carregar";
    document.getElementById("tbody").innerHTML = `<tr><td colspan="8" style="padding:30px;text-align:center;color:#dc2626">⚠️ ${e.message}</td></tr>`;
  } finally {
    btn.disabled = false; btn.textContent = "↻ Atualizar";
  }
}

function renderKpis() {
  const dados = dadosFiltrados();
  if (!dados.length) return;
  const media = (dados.reduce((a,d)=>a+Number(d.variacao_acumulada),0)/dados.length).toFixed(1);
  const maior = dados[0], menor = dados[dados.length-1];
  document.getElementById("kpiRow").innerHTML = `
    <div class="kpi"><div class="kpi-val">${dados.length}</div><div class="kpi-label">Empreendimentos</div></div>
    <div class="kpi" style="border-top-color:#1A5276"><div class="kpi-val">${media}%</div><div class="kpi-label">Média acumulada</div><div class="kpi-sub">2022–2026</div></div>
    <div class="kpi" style="border-top-color:#22c55e"><div class="kpi-val" style="color:#0f7a55">${Number(maior.variacao_acumulada).toFixed(1)}%</div><div class="kpi-label">Maior</div><div class="kpi-sub">${maior.nome}</div></div>
    <div class="kpi" style="border-top-color:#f59e0b"><div class="kpi-val" style="color:#b45309">${Number(menor.variacao_acumulada).toFixed(1)}%</div><div class="kpi-label">Menor</div><div class="kpi-sub">${menor.nome}</div></div>
  `;
}

function setAba(a, btn) {
  aba = a;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderAtual();
}

function renderAtual() { aba === "zonas" ? renderZonas() : renderEmpreend(); }

function renderZonas() {
  const dados = dadosFiltrados();
  const mapa = {};
  dados.forEach(d => { if(!mapa[d.zona]) mapa[d.zona]=[]; mapa[d.zona].push(Number(d.variacao_acumulada)); });
  const zonas = Object.entries(mapa).map(([z,vs])=>({zona:z,acum:+(vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(1)})).sort((a,b)=>b.acum-a.acum);
  renderChart(zonas.map(z=>z.zona), zonas.map(z=>z.acum), zonas.map(z=>cor(z.zona)));

  document.getElementById("thead").innerHTML = `<tr><th>Zona</th><th class="r">Média acumulada</th></tr>`;
  const max = Math.max(...zonas.map(z=>z.acum));
  document.getElementById("tbody").innerHTML = zonas.map(z=>`
    <tr>
      <td><span class="badge" style="background:${cor(z.zona)}22;color:${cor(z.zona)}">${z.zona}</span></td>
      <td class="r"><div class="bar-row"><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(z.acum/max*100)}%;background:${cor(z.zona)}"></div></div><span class="acum" style="color:${cor(z.zona)}">${z.acum}%</span></div></td>
    </tr>`).join("");
}

function renderEmpreend() {
  const dados = dadosFiltrados();
  renderChart(dados.map(d=>d.nome), dados.map(d=>Number(d.variacao_acumulada)), dados.map(d=>cor(d.zona)));
  document.getElementById("thead").innerHTML = `<tr><th>Empreendimento</th><th>Bairro</th><th>Zona</th><th class="r">2022</th><th class="r">2023</th><th class="r">2024</th><th class="r">2025</th><th class="r">Acumulado</th></tr>`;
  const max = Math.max(...dados.map(d=>Number(d.variacao_acumulada)));
  document.getElementById("tbody").innerHTML = dados.map(d=>`
    <tr>
      <td style="font-weight:600;white-space:nowrap">${d.nome}</td>
      <td style="color:var(--muted);font-size:11px">${d.bairro||"—"}</td>
      <td><span class="badge" style="background:${cor(d.zona)}22;color:${cor(d.zona)}">${d.zona}</span></td>
      <td class="r">${d.variacao_2022!=null?Number(d.variacao_2022).toFixed(1)+"%":"—"}</td>
      <td class="r">${d.variacao_2023!=null?Number(d.variacao_2023).toFixed(1)+"%":"—"}</td>
      <td class="r">${d.variacao_2024!=null?Number(d.variacao_2024).toFixed(1)+"%":"—"}</td>
      <td class="r">${d.variacao_2025!=null?Number(d.variacao_2025).toFixed(1)+"%":"—"}</td>
      <td class="r"><div class="bar-row"><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(Number(d.variacao_acumulada)/max*100)}%;background:${cor(d.zona)}"></div></div><span class="acum" style="color:${cor(d.zona)}">${Number(d.variacao_acumulada).toFixed(1)}%</span></div></td>
    </tr>`).join("");
}

function renderChart(labels, values, colors) {
  if (chart) { chart.destroy(); chart = null; }
  chart = new Chart(document.getElementById("mainChart"), {
    type: "bar",
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderRadius: 4, borderSkipped: false }] },
    options: {
      indexAxis: "y",
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` ${c.parsed.x.toFixed(1)}%` } } },
      scales: {
        x: { ticks: { callback: v => v+"%", font: { size: 10 } }, grid: { color: "rgba(0,0,0,.05)" } },
        y: { ticks: { font: { size: 11 } } }
      }
    }
  });
}

carregarDados();
</script>
</body>
</html>
